<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二次函数图像可视化教学</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .content { padding: 30px; }
        .formula-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 0 10px 10px 0;
        }
        .formula {
            font-size: 1.8em;
            color: #333;
            text-align: center;
            font-family: 'Times New Roman', serif;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .control-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #e9ecef;
        }
        .control-group label {
            display: block;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .control-group input[type="range"] {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .value-display {
            text-align: center;
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-top: 10px;
        }
        .canvas-container {
            background: white;
            border: 3px solid #667eea;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        canvas {
            width: 100%;
            height: 400px;
            border-radius: 10px;
        }
        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .info-card h3 { font-size: 0.9em; opacity: 0.9; margin-bottom: 10px; }
        .info-card .value { font-size: 1.8em; font-weight: bold; }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #f8f9fa;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>二次函数图像可视化</h1>
            <p>拖动滑块，探索 y = ax² + bx + c 的奥秘</p>
        </div>
        
        <div class="content">
            <div class="formula-box">
                <div class="formula">y = <span id="a-val">1</span>x² + <span id="b-val">0</span>x + <span id="c-val">0</span></div>
            </div>
            
            <div class="control-group" style="background: #e3f2fd; border: 2px solid #667eea;">
                <label>自定义函数</label>
                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <span style="font-size: 1.2em;">y =</span>
                    <input type="text" id="custom-input" placeholder="输入函数，如: x^2+2*x+1" style="flex: 1; min-width: 200px; padding: 10px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em;">
                    <button class="btn btn-primary" onclick="applyCustom()" style="padding: 10px 20px;">应用</button>
                    <button class="btn btn-secondary" onclick="clearCustom()" style="padding: 10px 20px;">清除</button>
                </div>
                <p style="margin-top: 8px; color: #666; font-size: 0.85em;">支持: + - * / ^ ( ) x 数字</p>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>二次项系数 (a)</label>
                    <input type="range" id="a" min="-5" max="5" step="0.1" value="1">
                    <div class="value-display" id="a-display">a = 1</div>
                </div>
                <div class="control-group">
                    <label>一次项系数 (b)</label>
                    <input type="range" id="b" min="-10" max="10" step="0.1" value="0">
                    <div class="value-display" id="b-display">b = 0</div>
                </div>
                <div class="control-group">
                    <label>常数项 (c)</label>
                    <input type="range" id="c" min="-10" max="10" step="0.1" value="0">
                    <div class="value-display" id="c-display">c = 0</div>
                </div>
            </div>
            
            <div class="canvas-container">
                <canvas id="graph"></canvas>
            </div>
            
            <div class="info-panel">
                <div class="info-card"><h3>顶点坐标</h3><div class="value" id="vertex">(0, 0)</div></div>
                <div class="info-card"><h3>对称轴</h3><div class="value" id="axis">x = 0</div></div>
                <div class="info-card"><h3>开口方向</h3><div class="value" id="direction">向上</div></div>
                <div class="info-card"><h3>判别式</h3><div class="value" id="delta">0</div></div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="setExample(1, 0, 0)">y = x²</button>
                <button class="btn btn-primary" onclick="setExample(-1, 0, 0)">y = -x²</button>
                <button class="btn btn-secondary" onclick="reset()">重置</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        let customFunc = null;
        
        function parseFunction(expr) {
            expr = expr.replace(/\s/g, '').replace(/\^/g, '**');
            return (x) => { try { return eval(expr); } catch(e) { return NaN; } };
        }
        
        function applyCustom() {
            const input = document.getElementById('custom-input').value;
            if (!input) return;
            customFunc = parseFunction(input);
            draw();
        }
        
        function clearCustom() {
            document.getElementById('custom-input').value = '';
            customFunc = null;
            draw();
        }
        
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        function getValues() {
            return {
                a: parseFloat(document.getElementById('a').value),
                b: parseFloat(document.getElementById('b').value),
                c: parseFloat(document.getElementById('c').value)
            };
        }
        
        function draw() {
            const {a, b, c} = getValues();
            const w = canvas.width, h = canvas.height;
            const scale = 40, ox = w / 2, oy = h / 2;
            
            ctx.fillStyle = '#fafafa';
            ctx.fillRect(0, 0, w, h);
            
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i < w; i += scale) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
            for (let i = 0; i < h; i += scale) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
            
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(w, oy); ctx.moveTo(ox, 0); ctx.lineTo(ox, h); ctx.stroke();
            
            // 绘制刻度和标签
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            for (let i = -10; i <= 10; i++) {
                if (i !== 0) {
                    const x = ox + i * scale;
                    ctx.fillText(i.toString(), x, oy + 20);
                    ctx.beginPath();
                    ctx.moveTo(x, oy - 5);
                    ctx.lineTo(x, oy + 5);
                    ctx.stroke();
                }
            }
            ctx.textAlign = 'right';
            for (let i = -5; i <= 5; i++) {
                if (i !== 0) {
                    const y = oy - i * scale;
                    ctx.fillText(i.toString(), ox - 10, y + 5);
                    ctx.beginPath();
                    ctx.moveTo(ox - 5, y);
                    ctx.lineTo(ox + 5, y);
                    ctx.stroke();
                }
            }
            // 原点标记
            ctx.fillStyle = '#333';
            ctx.textAlign = 'right';
            ctx.fillText('O', ox - 15, oy + 20);
            
            ctx.strokeStyle = customFunc ? '#e74c3c' : '#667eea';
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            if (customFunc) {
                let first = true;
                for (let px = 0; px <= w; px += 2) {
                    const x = (px - ox) / scale;
                    const y = customFunc(x);
                    if (!isNaN(y) && Math.abs(y) < 100) {
                        const py = oy - y * scale;
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else { ctx.lineTo(px, py); }
                    }
                }
                ctx.stroke();
            } else if (a !== 0) {
                for (let px = 0; px <= w; px += 2) {
                    const x = (px - ox) / scale;
                    const y = a * x * x + b * x + c;
                    if (px === 0) ctx.moveTo(px, oy - y * scale);
                    else ctx.lineTo(px, oy - y * scale);
                }
                ctx.stroke();
            }
            
            updateInfo(a, b, c);
        }
        
        function updateInfo(a, b, c) {
            if (customFunc) {
                document.getElementById('a-val').textContent = 'f';
                document.getElementById('b-val').textContent = '(x)';
                document.getElementById('c-val').textContent = '';
                
                const f0 = customFunc(0), f1 = customFunc(1), f2 = customFunc(2);
                document.getElementById('a-display').textContent = `f(0)=${isNaN(f0)?'无':f0.toFixed(2)}`;
                document.getElementById('b-display').textContent = `f(1)=${isNaN(f1)?'无':f1.toFixed(2)}`;
                document.getElementById('c-display').textContent = `f(2)=${isNaN(f2)?'无':f2.toFixed(2)}`;
                
                let minY = Infinity, maxY = -Infinity, minX = 0, maxX = 0;
                for (let x = -10; x <= 10; x += 0.01) {
                    const y = customFunc(x);
                    if (!isNaN(y)) {
                        if (y < minY) { minY = y; minX = x; }
                        if (y > maxY) { maxY = y; maxX = x; }
                    }
                }
                const isMin = Math.abs(minY) < Math.abs(maxY);
                const vx = isMin ? minX : maxX, vy = isMin ? minY : maxY;
                document.getElementById('vertex').textContent = `(${vx.toFixed(2)}, ${vy.toFixed(2)})`;
                document.getElementById('axis').textContent = `x ≈ ${vx.toFixed(2)}`;
                document.getElementById('direction').textContent = isMin ? '向上' : '向下';
                document.getElementById('delta').textContent = '-';
                return;
            }
            
            document.getElementById('a-val').textContent = a;
            document.getElementById('b-val').textContent = b >= 0 ? (b === 0 ? '' : '+ ') + b : '- ' + Math.abs(b);
            document.getElementById('c-val').textContent = c >= 0 ? (c === 0 ? '' : '+ ') + c : '- ' + Math.abs(c);
            document.getElementById('a-display').textContent = `a = ${a}`;
            document.getElementById('b-display').textContent = `b = ${b}`;
            document.getElementById('c-display').textContent = `c = ${c}`;
            
            if (a !== 0) {
                const vx = -b / (2 * a), vy = a * vx * vx + b * vx + c;
                document.getElementById('vertex').textContent = `(${vx.toFixed(2)}, ${vy.toFixed(2)})`;
                document.getElementById('axis').textContent = `x = ${vx.toFixed(2)}`;
                document.getElementById('direction').textContent = a > 0 ? '向上' : '向下';
                const delta = b * b - 4 * a * c;
                document.getElementById('delta').textContent = delta.toFixed(2);
            }
        }
        
        function setExample(a, b, c) {
            document.getElementById('a').value = a;
            document.getElementById('b').value = b;
            document.getElementById('c').value = c;
            customFunc = null;
            document.getElementById('custom-input').value = '';
            draw();
        }
        
        function reset() {
            setExample(1, 0, 0);
        }
        
        document.getElementById('a').addEventListener('input', () => { customFunc = null; document.getElementById('custom-input').value = ''; draw(); });
        document.getElementById('b').addEventListener('input', () => { customFunc = null; document.getElementById('custom-input').value = ''; draw(); });
        document.getElementById('c').addEventListener('input', () => { customFunc = null; document.getElementById('custom-input').value = ''; draw(); });
        
        draw();
    </script>
</body>
</html>
